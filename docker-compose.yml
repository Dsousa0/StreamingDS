services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - internal

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/streamingds
      NODE_ENV: production
      ALLOWED_ORIGINS: https://hub.infinityforge.com.br
    depends_on:
      - mongo
    networks:
      - internal
      - streamingds-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=streamingds-network
      - traefik.http.routers.streamingds-api.rule=Host(`hub.infinityforge.com.br`) && PathPrefix(`/api`)
      - traefik.http.routers.streamingds-api.entrypoints=websecure
      - traefik.http.routers.streamingds-api.tls=true
      - traefik.http.routers.streamingds-api.tls.certresolver=letsencrypt
      - traefik.http.services.streamingds-api.loadbalancer.server.port=3001

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    networks:
      - streamingds-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=streamingds-network
      - traefik.http.routers.streamingds-client.rule=Host(`hub.infinityforge.com.br`)
      - traefik.http.routers.streamingds-client.entrypoints=websecure
      - traefik.http.routers.streamingds-client.tls=true
      - traefik.http.routers.streamingds-client.tls.certresolver=letsencrypt
      - traefik.http.services.streamingds-client.loadbalancer.server.port=80

volumes:
  mongo_data:

networks:
  streamingds-network:
    name: streamingds-network
    driver: bridge
  internal:
