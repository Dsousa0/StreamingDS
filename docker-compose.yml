services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=danieltim.ds@gmail.com
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - public

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - internal

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/streamingds
      NODE_ENV: production
      ALLOWED_ORIGINS: https://infinityforge.com.br
    depends_on:
      - mongo
    networks:
      - internal
      - public
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`infinityforge.com.br`) && PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=3001

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    restart: unless-stopped
    networks:
      - public
    labels:
      - traefik.enable=true
      - traefik.http.routers.client.rule=Host(`infinityforge.com.br`)
      - traefik.http.routers.client.entrypoints=websecure
      - traefik.http.routers.client.tls.certresolver=letsencrypt
      - traefik.http.services.client.loadbalancer.server.port=80

volumes:
  mongo_data:
  letsencrypt:

networks:
  public:
  internal:
